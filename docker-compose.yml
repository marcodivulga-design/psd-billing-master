version: '3.8'

services:
  # Database
  mysql:
    image: mysql:8.0
    container_name: psd-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-psd_hub}
      MYSQL_USER: ${DB_USER:-psd_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-psd_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./drizzle/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - psd-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: psd-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5
    networks:
      - psd-network

  # Backend Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: psd-backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: mysql://${DB_USER:-psd_user}:${DB_PASSWORD:-psd_password}@mysql:3306/${DB_NAME:-psd_hub}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_KEY: ${STRIPE_KEY}
      ASAAS_KEY: ${ASAAS_KEY}
      SENDGRID_KEY: ${SENDGRID_KEY}
      TWILIO_KEY: ${TWILIO_KEY}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app/server
      - ./drizzle:/app/drizzle
    networks:
      - psd-network
    restart: unless-stopped

  # Frontend Server
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: psd-frontend
    environment:
      VITE_API_URL: http://backend:3000
      VITE_APP_TITLE: ${VITE_APP_TITLE:-PSD Hub}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./client:/app/client
    networks:
      - psd-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: psd-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - psd-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  psd-network:
    driver: bridge
